<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Portfolio</title>
    <style>
        /* --- NETFLIX BRANDING --- */
        :root {
            --bg-black: #141414;
            --text-grey: #6d6d6d;
            --text-white: #fff;
            --profile-blue: #00a4ef;
            --profile-grey: #808080;
            --profile-red: #e50914;
            --profile-yellow: #f5b92a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-white);
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            max-width: 80%;
        }

        h1 {
            font-size: 3.5vw;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* --- PROFILE GRID --- */
        .profile-gate {
            display: flex;
            justify-content: center;
            gap: 2vw;
            list-style: none;
            padding: 0;
        }

        /* --- THE CLICKABLE LINK --- */
        .profile-link {
            text-decoration: none;
            display: block;
            width: 10vw;
            min-width: 80px;
            max-width: 150px;
        }

        /* --- THE IMAGE CONTAINER (THE BOX) --- */
        .avatar-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            overflow: hidden; /* Important for the zoom effect */
            border: 3px solid transparent;
            transition: border-color 0.3s;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        /* --- HOVER EFFECTS --- */
        .profile-link:hover .avatar-wrapper {
            border-color: var(--text-white);
        }

        .profile-link:hover .avatar-img {
            transform: scale(1.1); /* Zoom effect on the fur image */
        }

        .profile-link:hover .profile-name {
            color: var(--text-white);
        }

        /* --- PROFILE TEXT --- */
        .profile-name {
            margin-top: 15px;
            color: var(--text-grey);
            font-size: 1.2vw;
            transition: color 0.3s;
        }

        /* --- BUTTON BELOW --- */
        .manage-button {
            margin-top: 50px;
            background: transparent;
            color: var(--text-grey);
            border: 1px solid var(--text-grey);
            padding: 10px 30px;
            font-size: 1.2vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .manage-button:hover {
            color: var(--text-white);
            border-color: var(--text-white);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .profile-gate { flex-wrap: wrap; }
            .profile-link { width: 120px; }
            .profile-name { font-size: 1rem; }
            .manage-button { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Who's Watching?</h1>
        
        <ul class="profile-gate">
            <li>
                <a href="menu2.html" class="profile-link">
                    <div class="avatar-wrapper">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvW15m_SY-oEMjBgNHZ5LnTbXtRnffH09u2w&s" alt="Recruiter" class="avatar-img">
                    </div>
                    <p class="profile-name">STUDENT</p>
                </a>
            </li>

            <li>
                <a href="menu.html" class="profile-link">
                    <div class="avatar-wrapper">
                        <img src="https://i.pinimg.com/736x/92/b4/e7/92b4e7c57de1b5e1e8c5e883fd915450.jpg" alt="Developer" class="avatar-img">
                    </div>
                    <p class="profile-name">PROFESSOR</p>
                </a>
            </li>

    </div>

</body>
</html>
